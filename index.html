<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0C3833">
<title>Consolida — meus gastos</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root{
    --paper:#F2F4F2; --surface:#FFFFFF; --ink:#15201C; --muted:#6A7470;
    --primary:#134E48; --primary-deep:#0C3833; --accent:#E0823D;
    --income:#2F8F6F; --expense:#C2542B; --line:#E3E6E3; --line-soft:#EEF0EE;
    --c0:#134E48; --c1:#E0823D; --c2:#3B6FB0; --c3:#B0413B; --c4:#6E8B3D;
    --c5:#8A5BB0; --c6:#C99A2E; --c7:#3F9A8C; --c8:#A6586F; --c9:#5A6470;
    --radius:16px; --radius-sm:11px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    font-family:var(--font); background:var(--paper); color:var(--ink);
    font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
    padding-bottom:calc(78px + env(safe-area-inset-bottom));
  }
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1}
  .eyebrow{font-size:11px; letter-spacing:.13em; text-transform:uppercase; color:var(--muted); font-weight:700}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
  input,select{font-family:inherit; font-size:15px}

  /* App bar */
  header.appbar{
    position:sticky; top:0; z-index:30; background:var(--primary-deep);
    color:#EAF2EF; padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;
    display:flex; align-items:center; gap:12px;
  }
  header.appbar .logo{
    width:30px;height:30px;border-radius:9px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;
    font-weight:800;color:#231204;font-size:16px;
  }
  header.appbar h1{font-size:17px; margin:0; font-weight:700; letter-spacing:-.01em}
  header.appbar .spacer{flex:1}
  header.appbar .barbtn{color:#CFE0DB; font-size:13px; font-weight:600; padding:7px 10px; border-radius:9px; background:rgba(255,255,255,.08)}

  main{max-width:760px; margin:0 auto; padding:18px 16px 24px}
  .view{display:none}
  .view.active{display:block; animation:fade .25s ease}
  @keyframes fade{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}

  /* Cards */
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px}
  .card + .card{margin-top:14px}

  /* Hero summary */
  .hero{background:linear-gradient(150deg,var(--primary) 0%, var(--primary-deep) 100%); color:#EAF2EF; border:none; position:relative; overflow:hidden}
  .hero .period{display:flex; align-items:center; gap:8px; margin-bottom:6px}
  .hero .period button{color:#BCD2CC; font-size:18px; line-height:1; padding:4px 8px; border-radius:8px; background:rgba(255,255,255,.08)}
  .hero .period .lbl{font-weight:700; letter-spacing:.02em; flex:1; text-align:center; font-size:14px}
  .hero .total{font-size:40px; font-weight:800; letter-spacing:-.02em; margin:2px 0 0}
  .hero .total small{font-size:20px; font-weight:700; opacity:.7; margin-right:4px}
  .hero .sub{color:#BCD2CC; font-size:13px; margin-top:4px}
  .hero .spark{margin-top:14px; height:42px; width:100%}
  .hero .delta{font-weight:700; padding:2px 8px; border-radius:999px; font-size:12px}
  .hero .delta.up{background:rgba(224,130,61,.25); color:#FFD9B8}
  .hero .delta.down{background:rgba(47,143,111,.28); color:#C9F0DF}

  /* Section heads */
  .sec-head{display:flex; align-items:baseline; justify-content:space-between; margin:22px 2px 10px}
  .sec-head h2{font-size:16px; margin:0; font-weight:700; letter-spacing:-.01em}
  .sec-head a{font-size:13px; color:var(--primary); font-weight:600}

  /* Category bars */
  .catrow{display:flex; align-items:center; gap:11px; padding:9px 0}
  .catrow + .catrow{border-top:1px solid var(--line-soft)}
  .catdot{width:11px;height:11px;border-radius:4px;flex:0 0 auto}
  .catrow .nm{flex:1; font-weight:600; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .catrow .val{font-weight:700}
  .catrow .pct{color:var(--muted); font-size:12px; width:38px; text-align:right}
  .barwrap{height:7px; background:var(--line-soft); border-radius:4px; overflow:hidden; margin-top:5px}
  .barwrap > i{display:block; height:100%; border-radius:4px}

  /* Source chips */
  .sources{display:flex; flex-wrap:wrap; gap:9px}
  .srcchip{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:10px 13px; flex:1 1 calc(50% - 9px); min-width:140px}
  .srcchip .t{font-size:12px; color:var(--muted); font-weight:600; display:flex; align-items:center; gap:6px}
  .srcchip .v{font-size:19px; font-weight:800; margin-top:3px; letter-spacing:-.01em}

  /* Transaction list */
  .txfilters{display:flex; gap:8px; margin-bottom:12px}
  .txfilters input,.txfilters select{flex:1; padding:11px 12px; border:1px solid var(--line); border-radius:11px; background:var(--surface); color:var(--ink); min-width:0}
  .tx{display:flex; align-items:center; gap:12px; padding:12px 0}
  .tx + .tx{border-top:1px solid var(--line-soft)}
  .tx .ic{width:38px;height:38px;border-radius:11px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px}
  .tx .mid{flex:1; min-width:0}
  .tx .desc{font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .tx .meta{font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px}
  .tx .amt{font-weight:800; white-space:nowrap}
  .tx .amt.in{color:var(--income)}
  .daygroup{font-size:12px; color:var(--muted); font-weight:700; margin:18px 2px 2px; letter-spacing:.02em}

  /* Empty state */
  .empty{text-align:center; padding:46px 20px; color:var(--muted)}
  .empty .big{font-size:34px; margin-bottom:8px}
  .empty h3{color:var(--ink); margin:0 0 6px; font-size:18px}
  .empty p{margin:0 auto 18px; max-width:340px}

  /* Buttons */
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:13px 18px; border-radius:12px; font-weight:700; font-size:15px}
  .btn.primary{background:var(--primary); color:#fff}
  .btn.accent{background:var(--accent); color:#231204}
  .btn.ghost{background:var(--surface); border:1px solid var(--line); color:var(--ink)}
  .btn.block{display:flex; width:100%}
  .btn.sm{padding:9px 13px; font-size:13px; border-radius:10px}

  /* Bottom nav */
  nav.tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:40; background:rgba(255,255,255,.92);
    backdrop-filter:saturate(1.6) blur(12px); border-top:1px solid var(--line);
    display:flex; padding:8px 8px calc(8px + env(safe-area-inset-bottom));
  }
  nav.tabbar button{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0; color:var(--muted); font-size:11px; font-weight:600; border-radius:12px}
  nav.tabbar button svg{width:23px;height:23px}
  nav.tabbar button.on{color:var(--primary)}
  nav.tabbar .fab{flex:0 0 auto; width:58px; margin-top:-22px}
  nav.tabbar .fab .ring{width:54px;height:54px;border-radius:18px;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(224,130,61,.4); color:#231204}
  nav.tabbar .fab .ring svg{width:26px;height:26px}

  /* Sheet / modal */
  .sheet-bg{position:fixed; inset:0; background:rgba(20,32,28,.45); z-index:60; opacity:0; pointer-events:none; transition:opacity .2s}
  .sheet-bg.open{opacity:1; pointer-events:auto}
  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:61; background:var(--surface); border-radius:22px 22px 0 0; padding:8px 18px calc(20px + env(safe-area-inset-bottom)); max-width:760px; margin:0 auto; transform:translateY(102%); transition:transform .26s cubic-bezier(.3,.8,.4,1); max-height:90vh; overflow-y:auto}
  .sheet.open{transform:none}
  .sheet .grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:8px auto 14px}
  .sheet h3{margin:0 0 4px; font-size:19px; letter-spacing:-.01em}
  .sheet .hint{color:var(--muted); font-size:13px; margin:0 0 16px}
  .field{margin-bottom:14px}
  .field label{display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px; letter-spacing:.02em}
  .field input,.field select{width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:11px; background:var(--surface); color:var(--ink)}
  .drop{border:2px dashed var(--line); border-radius:14px; padding:30px 18px; text-align:center; color:var(--muted); background:var(--paper)}
  .drop.hi{border-color:var(--primary); background:#EAF2EF}
  .drop .big{font-size:30px; margin-bottom:8px}

  .pill{display:inline-flex; align-items:center; gap:6px; padding:7px 12px; border-radius:999px; border:1px solid var(--line); background:var(--surface); font-size:13px; font-weight:600; margin:0 7px 7px 0}
  .pill.on{background:var(--primary); color:#fff; border-color:var(--primary)}

  .catpick{display:flex; flex-wrap:wrap; gap:8px}
  .toast{position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:11px 18px; border-radius:12px; font-size:14px; font-weight:600; z-index:90; opacity:0; transition:.25s; pointer-events:none; max-width:90%}
  .toast.show{opacity:1; transform:translateX(-50%)}

  .listitem{display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line-soft)}
  .listitem .mid{flex:1; min-width:0}
  .listitem .mid .t{font-weight:600}
  .listitem .mid .s{font-size:12px; color:var(--muted)}
  .small-muted{color:var(--muted); font-size:13px}
  .donutwrap{display:flex; align-items:center; gap:18px}
  .donutwrap svg{flex:0 0 auto}
  .row-between{display:flex; align-items:center; justify-content:space-between; gap:12px}
  hr.soft{border:none; border-top:1px solid var(--line-soft); margin:16px 0}
  .tag{font-size:11px; font-weight:700; padding:3px 8px; border-radius:7px; background:var(--line-soft); color:var(--muted)}
</style>
</head>

<script>
/* =========================================================
   CONSOLIDA — PWA local-first de gastos
   Dados ficam 100% no dispositivo (IndexedDB). Nada vai p/ servidor.
   ========================================================= */

/* ---------- IndexedDB mínimo ---------- */
const DB = (() => {
  let dbp;
  function open(){
    if(dbp) return dbp;
    dbp = new Promise((res,rej)=>{
      const r = indexedDB.open('consolida', 1);
      r.onupgradeneeded = e=>{
        const db = e.target.result;
        if(!db.objectStoreNames.contains('tx')) db.createObjectStore('tx',{keyPath:'id'});
        if(!db.objectStoreNames.contains('kv')) db.createObjectStore('kv',{keyPath:'k'});
      };
      r.onsuccess = ()=>res(r.result);
      r.onerror = ()=>rej(r.error);
    });
    return dbp;
  }
  async function all(store){
    const db = await open();
    return new Promise((res,rej)=>{
      const out=[]; const t=db.transaction(store).objectStore(store).openCursor();
      t.onsuccess=e=>{const c=e.target.result; if(c){out.push(c.value); c.continue();} else res(out);};
      t.onerror=()=>rej(t.error);
    });
  }
  async function bulkPut(store, items){
    const db = await open();
    return new Promise((res,rej)=>{
      const tr = db.transaction(store,'readwrite'); const os=tr.objectStore(store);
      items.forEach(i=>os.put(i));
      tr.oncomplete=()=>res(); tr.onerror=()=>rej(tr.error);
    });
  }
  async function put(store,item){ return bulkPut(store,[item]); }
  async function del(store,key){
    const db=await open();
    return new Promise((res,rej)=>{const tr=db.transaction(store,'readwrite'); tr.objectStore(store).delete(key); tr.oncomplete=()=>res(); tr.onerror=()=>rej(tr.error);});
  }
  async function clear(store){
    const db=await open();
    return new Promise((res,rej)=>{const tr=db.transaction(store,'readwrite'); tr.objectStore(store).clear(); tr.oncomplete=()=>res(); tr.onerror=()=>rej(tr.error);});
  }
  async function getKV(k,def){ const a=await all('kv'); const f=a.find(x=>x.k===k); return f?f.v:def; }
  async function setKV(k,v){ return put('kv',{k,v}); }
  return {all,bulkPut,put,del,clear,getKV,setKV};
})();

/* ---------- Categorias padrão + regras ---------- */
const DEFAULT_CATS = [
  {id:'alimentacao', nome:'Alimentação', cor:'var(--c1)', subs:[

    {id:'almoco_trab', nome:'Almoço do trabalho', kws:['piccolo','millo','rick doces']},
    {id:'restaurantes', nome:'Restaurantes e Padarias', kws:['outback','donalds','habib','padaria','pizzaria','restaurante','picanha','cafe']},
    {id:'delivery', nome:'Delivery', kws:['keeta','ifood','ifd','kta','delivery']},
  ]},

    {id:'impostos', nome:'Impostos', kws:['receita federal','pis cofins','darf']},

  ]},
  {id:'lazer', nome:'Lazer', cor:'var(--c5)', subs:[
    {id:'viagens', nome:'Viagens', kws:['hotel','latam','booking','decolar','airbnb','gol ','azul ']},
    {id:'eventos', nome:'Eventos', kws:['cinema','ingresso','show']},
  ]},
  {id:'pet', nome:'Pet', cor:'var(--c8)', subs:[

    {id:'veterinario', nome:'Veterinário', kws:['veterinari','pet shop','clinica vet']},
  ]},
  {id:'compras', nome:'Compras', cor:'var(--c4)', subs:[
    {id:'compras_yago', nome:'Compras Yago', kws:['kaizen','loterica']},
    {id:'compras_nat', nome:'Compras Nat', kws:['pilates']},
    {id:'compras_be', nome:'Compras Bê', kws:['tiptop']},
    {id:'compras_casa', nome:'Compras casa', kws:[]},
  ]},
  {id:'entradas', nome:'Entradas', cor:'var(--income)', subs:[
    {id:'salario', nome:'Salário', kws:['yt consultoria','salario','pagamento recebido']},
    {id:'vendas', nome:'Vendas', kws:[]},
    {id:'mache', nome:'Maché', kws:['canever']},
  ]},
  {id:'outros', nome:'Outros', cor:'var(--c9)', subs:[
    {id:'desconsiderar', nome:'Desconsiderar', exclude:true, kws:['cdb','cofrinhos','aplicacao','aplic aut','resgate','rend pago','pgto fat cartao','fat cartao','pagamento de fatura','itau black','emissao de cdb']},
    {id:'sem_categoria', nome:'Sem categoria', kws:[]},

/* ---------- Estado ---------- */
let TX = [];          // transações
let CATS = [];        // categorias
let OVERRIDES = {};   // txId -> "catId/subId" (categoria/subcategoria manual)
let IGNORED = new Set(); // txIds marcados manualmente como "desconsiderar"
let periodOffset = 0; // 0 = mês atual, -1 = anterior...

/* ---------- Helpers ---------- */
const BRL = n => (n<0?'-':'') + 'R$ ' + Math.abs(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const BRLc = n => Math.abs(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const normMatch = s => norm(s).replace(/['’`´]/g,'');   // ignora apóstrofo: McDonald's -> donalds
const monthKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const MES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const MESLONG = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function hashTx(t){
  const s = `${t.source}|${t.date}|${t.amount.toFixed(2)}|${norm(t.desc).slice(0,40)}`;
  let h=0; for(let i=0;i<s.length;i++){h=(h*31 + s.charCodeAt(i))|0;}
  return 'tx_'+Math.abs(h).toString(36)+'_'+s.length;
}
// devolve sempre {cat, sub} (sub pode ser null = categoria sem subcategoria definida)
function catOf(t){
  if(OVERRIDES[t.id]){
    const [cid,sid]=OVERRIDES[t.id].split('/');
    const c=CATS.find(x=>x.id===cid);
    if(c){ const s=c.subs.find(x=>x.id===sid)||null; return {cat:c, sub:s}; }
  }
  const d=normMatch(t.desc);
  for(const c of CATS){
    if(t.amount<0 && c.id==='entradas') continue;                       // saída nunca é Entrada
    if(t.amount>0 && c.id!=='entradas' && c.id!=='outros') continue;    // entrada só em Entradas (ou Desconsiderar)
    for(const s of c.subs){
      if(s.kws && s.kws.some(k=>k && d.includes(normMatch(k)))) return {cat:c, sub:s};
    }
  }
  if(t.amount>0){ const e=CATS.find(c=>c.id==='entradas'); return {cat:e, sub:null}; }
  const o=CATS.find(c=>c.id==='outros'); return {cat:o, sub:o.subs.find(s=>s.id==='sem_categoria')||null};
}
function isExcluded(t){ if(IGNORED.has(t.id)) return true; const {sub}=catOf(t); return !!(sub&&sub.exclude); }
function resolveColor(v){
  if(!v||!v.startsWith('var(')) return v||'#999';
  const name=v.slice(4,-1).trim();
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim()||'#999';
}

/* ---------- Parsers ---------- */
function parseOFX(text, sourceName){
  const out=[];
  // OFX 1.x é SGML (tags não fechadas). Pegamos por bloco STMTTRN.
  const blocks = text.split(/<STMTTRN>/i).slice(1);
  // tenta achar id da conta/cartão
  const acct = (text.match(/<ACCTID>([^<\r\n]+)/i)||text.match(/<CCACCTID>([^<\r\n]+)/i)||[])[1];
  const src = sourceName || (acct ? 'Conta '+acct.trim().slice(-4) : 'OFX');
  for(const b of blocks){
    const g = re => { const m=b.match(re); return m?m[1].trim():''; };
    const dtRaw = g(/<DTPOSTED>([^<\r\n]+)/i);
    const amtRaw = g(/<TRNAMT>([^<\r\n]+)/i);
    let desc = g(/<MEMO>([^<\r\n]+)/i) || g(/<NAME>([^<\r\n]+)/i) || 'Sem descrição';
    if(!dtRaw || !amtRaw) continue;
    const y=dtRaw.slice(0,4), mo=dtRaw.slice(4,6), da=dtRaw.slice(6,8);
    const date = `${y}-${mo}-${da}`;
    const amount = parseFloat(amtRaw.replace(',','.'));
    if(isNaN(amount)) continue;
    out.push({source:src, date, amount, desc:desc.replace(/\s+/g,' ').trim()});
  }
  return out;
}

function detectDelim(line){ const c=(line.match(/;/g)||[]).length, v=(line.match(/,/g)||[]).length; return c>=v?';':','; }
function splitCSVLine(line, d){
  const out=[]; let cur='', q=false;
  for(let i=0;i<line.length;i++){ const ch=line[i];
    if(ch==='"'){ if(q&&line[i+1]==='"'){cur+='"';i++;} else q=!q; }
    else if(ch===d && !q){ out.push(cur); cur=''; }
    else cur+=ch;
  }
  out.push(cur); return out.map(s=>s.trim());
}
function parseCSVraw(text){
  const lines = text.split(/\r?\n/).filter(l=>l.trim().length);
  if(!lines.length) return {header:[],rows:[]};
  const d = detectDelim(lines[0]);
  const header = splitCSVLine(lines[0], d);
  const rows = lines.slice(1).map(l=>splitCSVLine(l,d));
  return {header,rows,delim:d};
}
function guessMap(header){
  const h = header.map(norm);
  // prioridade por PALAVRA-CHAVE (não pela ordem da coluna): a 1ª keyword que casar vence
  const byKw = (kws, excl=[]) => {
    for(const kw of kws){ for(let i=0;i<h.length;i++){ if(h[i].includes(kw) && !excl.some(e=>h[i].includes(e))) return i; } }
    return -1;
  };
  // valor: primeiro tenta a coluna em R$/reais; só depois "valor" genérico, excluindo US$/cotação
  let amount = byKw(['valor (em r$)','valor em r$','valor r$','valor (r$)','reais','brl']);
  if(amount<0) amount = byKw(['valor','amount','value','montante','total','quantia'], ['us$','usd','dolar','dólar','cotac']);
  // descrição: evita "Nome no Cartão"; usa 'nome' só como último recurso
  let desc = byKw(['descri','histor','estabelec','lancamento','title','memo']);
  if(desc<0) desc = byKw(['nome']);
  return {
    date: byKw(['data de compra','data','date','dt','posted']),
    desc, amount,
    cat:  byKw(['categoria','category']),       // categoria do próprio banco (C6 / Itaú)
    card: byKw(['final do cartao','final cartao','final','cartao final']),
    parcela: byKw(['parcela','installment']),
  };
}
// Mapeia categorias dos bancos (C6/Itaú) -> baldes do app
const BANKCAT_MAP = {
  'alimentacao':'aliment','restaurante':'aliment',
  'mercado':'mercado','supermercado':'mercado',
  'automotivo':'transporte','veiculos':'transporte','transporte':'transporte','combustivel':'transporte',
  'saude':'saude','seguro':'saude','farmacia':'saude',
  'entretenimento':'lazer','turismo e entretenim':'lazer','turismo':'lazer','hobby':'lazer','arte / artesanato / passatempo':'lazer','lazer':'lazer',
  'vestuario':'compras','departamento / desconto':'compras','especialidade varejo':'compras','marketing direto':'compras','marketplace':'compras','compras':'compras',
  'moradia':'moradia',
  'servicos pessoais':'outros','governo':'outros','diversos':'outros','-':'outros',
};
function mapBankCat(raw){ if(!raw) return null; const k=norm(raw).trim(); return BANKCAT_MAP[k] || null; }
function parseBRDate(s){
  s=s.trim();
  let m = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);    // 2025-03-04
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m = s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{2,4})/);       // 04/03/2025
  if(m){ let y=m[3]; if(y.length===2)y='20'+y; return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`; }
  const d=new Date(s); if(!isNaN(d)) return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return null;
}
function parseBRAmount(s){
  s=(s||'').replace(/[R$\s]/g,'');
  if(s.includes(',') && s.includes('.')){ s=s.replace(/\./g,'').replace(',','.'); }  // 1.234,56 (Itaú)
  else if(s.includes(',')){ s=s.replace(',','.'); }                                   // 1234,56
  // senão já está com ponto decimal (216.25 do C6) — não mexe
  const n=parseFloat(s); return isNaN(n)?null:n;
}
function parseCSVrows(rows, map, sourceName, invert, useBankCat){
  const out=[];
  for(const r of rows){
    const date = parseBRDate(r[map.date]||'');
    let amount = parseBRAmount(r[map.amount]||'');
    const desc = (r[map.desc]||'Sem descrição').replace(/\s+/g,' ').trim();
    if(!date || amount===null) continue;
    if(invert) amount = -amount;
    const cardVal = (map.card>=0 && r[map.card]) ? r[map.card].trim() : '';
    const t = {source:(sourceName||'CSV')+(cardVal?' ·'+cardVal:''), date, amount, desc};
    if(cardVal) t.card = cardVal;
    if(map.parcela>=0 && r[map.parcela]){ const p=r[map.parcela].trim(); if(p && !/^[uú]nica$/i.test(p)) t.parcela=p; }
    if(useBankCat && map.cat>=0){ const m=mapBankCat(r[map.cat]); if(m) t.bankCat=m; }
    out.push(t);
  }
  return out;
}

/* ---------- PDF (fatura Itaú / extratos) ---------- */
async function pdfToColumnLines(arrayBuffer, password){
  const doc = await pdfjsLib.getDocument({data:arrayBuffer, password}).promise;
  const out=[]; // sequência de linhas de coluna, em ordem de leitura
  for(let p=1;p<=doc.numPages;p++){
    const page=await doc.getPage(p);
    const vp=page.getViewport({scale:1});
    const tc=await page.getTextContent();
    const items=tc.items.filter(i=>i.str.trim()).map(i=>({s:i.str, x:i.transform[4], y:i.transform[5]}));
    // descobre a calha entre colunas pelas posições X das datas DD/MM
    const dx=items.filter(i=>/^\d{2}\/\d{2}$/.test(i.s)).map(i=>i.x).sort((a,b)=>a-b);
    let gutter=vp.width+1; // padrão: coluna única
    if(dx.length>=4){
      let gap=0, gi=0;
      for(let i=1;i<dx.length;i++){ if(dx[i]-dx[i-1]>gap){gap=dx[i]-dx[i-1]; gi=i;} }
      if(gap>vp.width*0.15){
        const maxLow=dx[gi-1], minHigh=dx[gi];
        gutter = minHigh - (minHigh-maxLow)*0.15; // logo à esquerda da coluna direita (não no meio das datas)
      }
    }
    for(const [lo,hi] of [[0,gutter],[gutter,vp.width+1]]){
      const rows={};
      for(const it of items){ if(it.x>=lo && it.x<hi){ const k=Math.round(it.y); (rows[k]=rows[k]||[]).push(it); } }
      const ys=Object.keys(rows).map(Number).sort((a,b)=>b-a); // topo->base
      for(const y of ys){ out.push(rows[y].sort((a,b)=>a.x-b.x).map(i=>i.s).join(' ')); }
      if(gutter>vp.width) break; // coluna única: não repete
    }
  }
  return out;
}

const ITAU_CAT_RE=/^([A-ZÁÉÍÓÚÂÊÔÃÕÇ][A-ZÁÉÍÓÚÂÊÔÃÕÇ /]{2,})\s+\./;
function parsePDFLines(lines, sourceName){
  const VALUE='\\d{1,3}(?:\\.\\d{3})*,\\d{2}';
  const TX=new RegExp(`(\\d{2}/\\d{2})(?!/\\d)\\s+(.+?)\\s+(${VALUE})`,'g');
  // inferência de ano: pega a data de vencimento (ou a maior DD/MM/YYYY)
  let vYear=new Date().getFullYear(), vMonth=12;
  const full=lines.join(' ');
  let mv=full.match(/[Vv]enc\w*[:\s]+(\d{2})\/(\d{2})\/(\d{4})/) || full.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if(mv){ vMonth=+mv[2]; vYear=+mv[3]; }
  const yearFor = mm => (mm>vMonth ? vYear-1 : vYear);

  const out=[]; let active=false, future=false, card=null;
  for(const line of lines){
    const low=line.toLowerCase();
    if(low.includes('lançamentos: compras')||low.includes('lancamentos: compras')) active=true;
    if((low.includes('compras parceladas'))&&low.includes('próxim')) future=true;
    const fm=line.match(/\(final (\d{4})\)/); if(fm) card=fm[1];
    if(!active||future) continue;
    if(low.includes('lançamentos no cartão')||low.includes('total dos lançamentos')) continue;
    // categoria do Itaú na linha -> aplica ao último lançamento desta sequência
    const cm=line.match(ITAU_CAT_RE);
    if(cm && out.length){ const mapped=mapBankCat(cm[1]); if(mapped && !out[out.length-1]._catLocked) out[out.length-1].bankCat=mapped; }
    let m;
    while((m=TX.exec(line))!==null){
      const desc=m[2].trim(); if(!desc||/^\d+$/.test(desc)) continue;
      const mm=+m[1].slice(3,5), dd=m[1].slice(0,2);
      const date=`${yearFor(mm)}-${String(mm).padStart(2,'0')}-${dd}`;
      const amount=-parseBRAmount(m[3]);   // fatura: cobrança = despesa
      const t={source:(sourceName||'Itaú cartão')+(card?' ·'+card:''), date, amount, desc};
      if(card) t.card=card;
      out.push(t);
    }
  }
  return out;
}

/* ---------- Extrato de conta (Itaú e C6) ---------- */
function parseExtrato(lines, sourceName){
  const VAL='\\d{1,3}(?:\\.\\d{3})*,\\d{2}';
  const VRE=new RegExp(`(-?)\\s*R?\\$?\\s*(${VAL})\\s*$`);
  const HEAD=new RegExp('^(jan|fev|mar|abr|mai|jun|jul|ago|set|out|nov|dez)[a-zç]*\\s+(\\d{4})','i');
  let curYear=new Date().getFullYear();
  const out=[];
  for(const raw of lines){
    const line=(raw||'').trim(); if(!line) continue;
    const low=norm(line);
    const hm=line.match(HEAD); if(hm){ curYear=+hm[2]; continue; }
    if(low.includes('saldo do dia')||low.includes('saldo em conta')||low.startsWith('data ')||low.includes('periodo')||(low.includes('entradas')&&low.includes('saidas'))) continue;
    const dm=line.match(/^(\d{2})\/(\d{2})(?:\/(\d{4}))?/); if(!dm) continue;
    const vm=line.match(VRE); if(!vm) continue;
    const dd=dm[1], mm=dm[2], yy=dm[3]?+dm[3]:curYear;
    let desc=line.replace(/^(\d{2}\/\d{2}(?:\/\d{4})?\s+){1,2}/,'').replace(VRE,'').trim() || 'Lançamento';
    let amount=parseBRAmount(vm[2]); if(amount===null) continue;
    if(vm[1]==='-') amount=-amount;   // extrato traz o sinal: entradas +, saídas −
    out.push({source:sourceName||'Conta (PDF)', date:`${yy}-${String(mm).padStart(2,'0')}-${dd}`, amount, desc:desc.replace(/\s+/g,' ')});
  }
  return out;
}

/* ---------- Decide qual parser de PDF usar ---------- */
function parsePDF(lines, sourceName){
  const t=norm(lines.join(' '));
  const isFatura = t.includes('lancamentos: compras') || t.includes('total desta fatura') || t.includes('mastercard');
  return isFatura ? parsePDFLines(lines, sourceName||'Cartão (PDF)')
                  : parseExtrato(lines, sourceName||'Conta (PDF)');
}

async function ingest(newTx){
  let added=0, dup=0;
  const existing = new Set(TX.map(t=>t.id));
  const toAdd=[];
  for(const t of newTx){
    t.id = hashTx(t);
    if(existing.has(t.id)){ dup++; continue; }
    existing.add(t.id); toAdd.push(t); added++;
  }
  if(toAdd.length){ await DB.bulkPut('tx', toAdd); TX=TX.concat(toAdd); }
  return {added, dup};
}

/* ---------- Cálculos do período ---------- */
function periodMonth(off){ const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+off); return d; }
function txInMonth(off){
  const d=periodMonth(off); const k=monthKey(d);
  return TX.filter(t=>t.date.slice(0,7)===k);
}
function expensesOnly(list){ return list.filter(t=>t.amount<0); }
function spendOnly(list){ return list.filter(t=>t.amount<0 && !isExcluded(t)); }

function renderPainel(){
  const el = document.getElementById('view-painel');
  if(TX.length===0){
    el.innerHTML = emptyState();

  }
  const d = periodMonth(periodOffset);
  const list = txInMonth(periodOffset);
  const exp = spendOnly(list);
  const totalExp = exp.reduce((s,t)=>s+t.amount,0); // negativo (sem transferências)
  const totalIn = list.filter(t=>t.amount>0 && !isExcluded(t)).reduce((s,t)=>s+t.amount,0);
  const totalTransf = list.filter(t=>t.amount<0 && isExcluded(t)).reduce((s,t)=>s+t.amount,0);

  // mês anterior p/ delta
  const prevExp = spendOnly(txInMonth(periodOffset-1)).reduce((s,t)=>s+t.amount,0);
  let deltaHtml='';
  if(prevExp!==0){
    const pct = ((Math.abs(totalExp)-Math.abs(prevExp))/Math.abs(prevExp))*100;
    const up = pct>=0;
    deltaHtml = `<span class="delta ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(pct).toFixed(0)}% vs mês anterior</span>`;
  }

  // por categoria (nível 1)
  const byCat = {};
  for(const t of exp){ const {cat}=catOf(t); byCat[cat.id]=byCat[cat.id]||{cat,sum:0,n:0}; byCat[cat.id].sum+=t.amount; byCat[cat.id].n++; }
  const cats = Object.values(byCat).sort((a,b)=>a.sum-b.sum); // mais negativo primeiro

  // por fonte
  const bySrc={};
  for(const t of exp){ bySrc[t.source]=(bySrc[t.source]||0)+t.amount; }

  // sparkline 6 meses

        <span class="nm">${c.cat.nome}</span>

        <span class="val num">${BRLc(c.sum)}</span>
      </div>
      <div class="barwrap"><i style="width:${pct.toFixed(1)}%;background:${resolveColor(c.cat.cor)}"></i></div>
    </div>`;
  }).join('');

  const srcChips = srcs.map(([name,v])=>`
    <div class="srcchip">
      <div class="t">▦ ${name}</div>
      <div class="v num">${BRLc(v)}</div>
    </div>`).join('') || '<div class="small-muted">Sem fontes neste mês</div>';

  el.innerHTML = `

      <div class="period">

      </div>

      <div class="total num"><small>R$</small>${BRLc(totalExp)}</div>

        ${exp.length} lançamentos · entradas ${BRL(totalIn)} ${deltaHtml}
      </div>
      ${totalTransf!==0?`<div class="sub" style="color:#9FC0B8">↔ ${BRLc(totalTransf)} desconsiderado (transfer./invest.) — fora do gasto</div>`:''}
      <svg class="spark" viewBox="0 0 300 42" preserveAspectRatio="none">${sparkPath(spark)}</svg>
    </div>

    <div class="sec-head"><h2>Por fonte</h2><a onclick="openImport()">+ importar</a></div>

function sparkPath(vals){
  const max=Math.max(...vals,1), n=vals.length, W=300, H=42, pad=3;
  const pts=vals.map((v,i)=>{ const x=(i/(n-1))*(W); const y=H-pad-(v/max)*(H-pad*2); return [x,y]; });
  const line='M'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L');
  const area=line+` L${W},${H} L0,${H} Z`;
  const last=pts[pts.length-1];
  return `<path d="${area}" fill="rgba(224,130,61,.18)"/><path d="${line}" fill="none" stroke="#E0823D" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.4" fill="#E0823D"/>`;
}

      <select onchange="txFilter.cat=this.value;renderTxList()">
        <option value="">Categorias</option>
        ${cats.map(id=>{const c=CATS.find(x=>x.id===id);return `<option value="${id}" ${txFilter.cat===id?'selected':''}>${c?c.nome:id}</option>`}).join('')}
      </select>
      <select onchange="txFilter.src=this.value;renderTxList()">
        <option value="">Fontes</option>
        ${srcs.map(s=>`<option value="${s}" ${txFilter.src===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>`;
  html += `<div class="card" id="txListCard">${txListHTML(list)}</div>`;
  el.innerHTML = html;
}
function renderTxList(){
  let list = txInMonth(periodOffset).slice();
  if(txFilter.q){ const q=norm(txFilter.q); list=list.filter(t=>norm(t.desc).includes(q)); }
  if(txFilter.cat){ list=list.filter(t=>catOf(t).cat.id===txFilter.cat); }
  if(txFilter.src){ list=list.filter(t=>t.source===txFilter.src); }
  list.sort((a,b)=> b.date.localeCompare(a.date) || Math.abs(b.amount)-Math.abs(a.amount));
  const c=document.getElementById('txListCard'); if(c) c.innerHTML=txListHTML(list);
}
function txListHTML(list){
  if(!list.length) return '<div class="small-muted" style="padding:18px 0;text-align:center">Nada por aqui com esses filtros.</div>';
  let html=''; let lastDay='';
  for(const t of list){
    const day=t.date;
    if(day!==lastDay){ const dd=new Date(t.date+'T12:00'); html+=`<div class="daygroup">${dd.getDate()} ${MES[dd.getMonth()]}</div>`; lastDay=day; }
    const {cat,sub}=catOf(t); const col=resolveColor(cat.cor);
    const ini=cat.nome[0];
    const excl=isExcluded(t);
    const label=`${cat.nome}${sub?' · '+sub.nome:''}`;
    html+=`<div class="tx" onclick="openTx('${t.id}')" ${excl?'style="opacity:.5"':''}>
      <div class="ic" style="background:${col}">${ini}</div>
      <div class="mid">
        <div class="desc">${esc(t.desc)}</div>
        <div class="meta">${label} · ${esc(t.source)}${t.parcela?' · '+t.parcela:''}${excl?' · desconsiderado':''}</div>
      </div>
      <div class="amt num ${t.amount>0?'in':''}">${t.amount>0?'+':''}${BRLc(t.amount)}</div>
    </div>`;
  }
  return html;
}
function esc(s){ return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

/* ---------- Categorias ---------- */
function renderCats(){
  const el=document.getElementById('view-cat');
  // totais por categoria e por subcategoria (todo o histórico de gastos)
  const totCat={}, totSub={};
  for(const t of expensesOnly(TX)){ const {cat,sub}=catOf(t); totCat[cat.id]=(totCat[cat.id]||0)+t.amount; const k=cat.id+'/'+(sub?sub.id:'—'); totSub[k]=(totSub[k]||0)+t.amount; }
  // donut do mês (por categoria)
  const exp=spendOnly(txInMonth(periodOffset));
  const byCat={}; for(const t of exp){ const {cat}=catOf(t); byCat[cat.id]=(byCat[cat.id]||0)+Math.abs(t.amount); }
  const donut = donutSVG(Object.entries(byCat).map(([id,v])=>({color:resolveColor(CATS.find(c=>c.id===id).cor), v})));
  const d=periodMonth(periodOffset);

  const tree = CATS.map(c=>{
    const col=resolveColor(c.cor);
    const subs = c.subs.map(s=>{
      const tot=totSub[c.id+'/'+s.id]||0;
      const kwTxt = s.kws&&s.kws.length ? s.kws.slice(0,6).join(', ')+(s.kws.length>6?'…':'') : '—';
      return `<div class="listitem" style="padding:10px 0" onclick="editSub('${c.id}','${s.id}')">
        <div class="mid">
          <div class="t">${s.nome}${s.exclude?' <span class="tag">fora do gasto</span>':''}</div>
          <div class="s">${esc(kwTxt)}</div>
        </div>
        <div class="num small-muted">${tot?BRLc(tot):''}</div>
        <span style="color:var(--muted);margin-left:8px">›</span>
      </div>`;
    }).join('');
    return `<div class="card" style="padding:14px 16px">
      <div class="row-between">
        <div style="display:flex;align-items:center;gap:9px"><span class="catdot" style="width:13px;height:13px;background:${col}"></span><b>${c.nome}</b></div>
        <div class="num small-muted">${totCat[c.id]?BRLc(totCat[c.id]):''}</div>
      </div>
      <div style="margin-top:4px">${subs||'<div class="small-muted" style="padding:8px 0">Sem subcategorias</div>'}</div>
      <button class="btn ghost sm" style="margin-top:8px" onclick="addSub('${c.id}')">+ subcategoria</button>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="card">
      <div class="eyebrow">Distribuição · ${MESLONG[d.getMonth()]}</div>
      <div class="donutwrap" style="margin-top:12px">
        ${donut}
        <div style="flex:1">
          ${Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,v])=>{
            const c=CATS.find(x=>x.id===id);
            return `<div class="catrow" style="padding:5px 0;border:none"><span class="catdot" style="background:${resolveColor(c.cor)}"></span><span class="nm">${c.nome}</span><span class="val num">${BRLc(v)}</span></div>`;
          }).join('') || '<div class="small-muted">Sem dados</div>'}
        </div>
      </div>
    </div>
    <div class="sec-head"><h2>Categorias e subcategorias</h2></div>
    ${tree}
    <p class="small-muted" style="text-align:center;margin:14px 4px">Toque numa subcategoria pra editar nome e palavras-chave. As palavras-chave classificam os lançamentos automaticamente (ignoram acento e maiúscula).</p>
  `;
}
function donutSVG(segs){
  const total=segs.reduce((s,x)=>s+x.v,0)||1; const R=44, C=2*Math.PI*R; let off=0;
  const circles=segs.map(s=>{ const len=(s.v/total)*C; const el=`<circle cx="60" cy="60" r="${R}" fill="none" stroke="${s.color}" stroke-width="16" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 60 60)"/>`; off+=len; return el; }).join('');
  return `<svg width="120" height="120" viewBox="0 0 120 120">${circles}<circle cx="60" cy="60" r="${R-9}" fill="var(--surface)"/></svg>`;
}

/* =========================================================
   SHEETS (importar, editar tx, editar categoria)
   ========================================================= */
function openSheet(html){ document.getElementById('sheet').innerHTML='<div class="grab"></div>'+html; document.getElementById('sheet').classList.add('open'); document.getElementById('sheetBg').classList.add('open'); }
function closeSheet(){ document.getElementById('sheet').classList.remove('open'); document.getElementById('sheetBg').classList.remove('open'); }

function openImport(){
  openSheet(`
    <h3>Importar extrato</h3>
    <p class="hint">Aceita OFX (extrato), CSV (fatura/extrato) e PDF (fatura Itaú, mesmo com senha). Pegue no app do banco em “exportar”.</p>
    <div class="drop" id="drop">
      <div class="big">⬇</div>
      <div style="font-weight:700;color:var(--ink)">Toque para escolher arquivo</div>
      <div style="margin-top:4px">ou arraste aqui (.ofx / .csv / .pdf)</div>
    </div>
    <div class="field" style="margin-top:16px">
      <label>Nome da fonte (opcional — ex: Nubank, Itaú cartão)</label>
      <input id="srcName" placeholder="Detecto automático se deixar vazio">
    </div>
  `);
  const drop=document.getElementById('drop');
  drop.onclick=()=>document.getElementById('fileInput').click();
  ['dragover','dragenter'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('hi')}));
  ['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('hi')}));
  drop.addEventListener('drop',ev=>{ handleFiles(ev.dataTransfer.files); });
}

async function handleFiles(files){
  const srcName=(document.getElementById('srcName')?.value||'').trim();
  let totalAdded=0, totalDup=0; let pendingCSV=null;
  for(const f of files){
    const isPDF = f.name.toLowerCase().endsWith('.pdf') || f.type==='application/pdf';
    if(isPDF){
      const r=await importPDF(f, srcName||f.name.replace(/\.[^.]+$/,''));
      totalAdded+=r.added; totalDup+=r.dup;
      continue;
    }
    const text=await f.text();
    const isOFX = /<OFX>/i.test(text) || /<STMTTRN>/i.test(text) || f.name.toLowerCase().endsWith('.ofx');
    if(isOFX){
      const tx=parseOFX(text, srcName);
      const r=await ingest(tx); totalAdded+=r.added; totalDup+=r.dup;
    } else {
      pendingCSV={text, name:srcName||f.name.replace(/\.[^.]+$/,'')};
    }
  }
  if(pendingCSV){ openCSVMapper(pendingCSV.text, pendingCSV.name, totalAdded, totalDup); return; }
  finishImport(totalAdded,totalDup);
}

async function importPDF(file, srcName, password){
  if(!window.pdfjsLib){ toast('Motor de PDF não carregou'); return {added:0,dup:0}; }
  const buf=await file.arrayBuffer();
  let lines;
  try{
    lines=await pdfToColumnLines(buf.slice(0), password);
  }catch(e){
    if(e && (e.name==='PasswordException' || /password/i.test(e.message||''))){
      const pwd=await askPassword(file.name);
      if(pwd===null) return {added:0,dup:0};
      return importPDF(file, srcName, pwd);
    }
    toast('Não consegui ler o PDF'); console.error(e); return {added:0,dup:0};
  }
  const tx=parsePDF(lines, srcName);
  if(!tx.length){ toast('PDF lido, mas não achei lançamentos reconhecíveis'); return {added:0,dup:0}; }
  return ingest(tx);
}

function askPassword(fname){
  return new Promise(res=>{
    openSheet(`
      <h3>PDF protegido</h3>
      <p class="hint">${esc(fname)} está com senha. Ela é usada só pra abrir o arquivo aqui no seu aparelho — não sai do celular.</p>
      <div class="field"><label>Senha do PDF</label><input id="pdfPwd" type="password" inputmode="numeric" placeholder="ex: 5 primeiros dígitos do CPF (C6)"></div>
      <button class="btn primary block" id="pwdGo">Abrir</button>
      <button class="btn ghost block" style="margin-top:10px" id="pwdCancel">Cancelar</button>
    `);
    const done=v=>{ res(v); };
    document.getElementById('pwdGo').onclick=()=>{ const v=document.getElementById('pdfPwd').value; done(v||''); };
    document.getElementById('pwdCancel').onclick=()=>{ closeSheet(); done(null); };
    setTimeout(()=>document.getElementById('pdfPwd')?.focus(),200);
  });
}

function openCSVMapper(text, srcName, prevAdded, prevDup){
  const {header,rows}=parseCSVraw(text);
  const g=guessMap(header);
  const opt=(sel,allowNone)=>(allowNone?`<option value="-1" ${sel<0?'selected':''}>— nenhuma —</option>`:'')+header.map((h,i)=>`<option value="${i}" ${sel===i?'selected':''}>${esc(h)||('coluna '+(i+1))}</option>`).join('');
  // auto-detecta sinal: se a coluna de valor tem algum negativo, provavelmente é extrato (gastos já negativos)
  let hasNeg=false; if(g.amount>=0){ for(const r of rows){ if((r[g.amount]||'').includes('-')){hasNeg=true;break;} } }
  const defInvert = !hasNeg; // sem negativos => fatura (positivos) => inverter
  openSheet(`
    <h3>Conferir colunas do CSV</h3>
    <p class="hint">Cada banco exporta diferente. Já tentei adivinhar — confira o essencial e importe.</p>
    <div class="field"><label>Data</label><select id="mDate">${opt(g.date)}</select></div>
    <div class="field"><label>Descrição</label><select id="mDesc">${opt(g.desc)}</select></div>
    <div class="field"><label>Valor (em R$)</label><select id="mAmt">${opt(g.amount)}</select></div>
    <div class="field">
      <label>Os valores de gasto vêm…</label>
      <select id="mInv">
        <option value="0" ${!defInvert?'selected':''}>negativos (-50,00) — padrão extrato</option>
        <option value="1" ${defInvert?'selected':''}>positivos (50,00) — comum em fatura de cartão</option>
      </select>
    </div>
    <div class="field"><label>Categoria do banco (opcional)</label><select id="mCat">${opt(g.cat,true)}</select></div>
    <div class="field"><label>Final do cartão (opcional)</label><select id="mCard">${opt(g.card,true)}</select></div>
    <label class="pill ${g.cat>=0?'on':''}" id="mUseCat" style="cursor:pointer">✓ usar categoria do banco quando houver</label>
    <div class="field" style="margin-top:14px"><label>Nome da fonte</label><input id="mSrc" value="${esc(srcName)}"></div>
    <button class="btn primary block" id="csvGo">Importar ${rows.length} linhas</button>
  `);
  let useCat = g.cat>=0;
  document.getElementById('mUseCat').onclick=function(){ useCat=!useCat; this.classList.toggle('on',useCat); };
  document.getElementById('csvGo').onclick=async()=>{
    const map={ date:+document.getElementById('mDate').value, desc:+document.getElementById('mDesc').value, amount:+document.getElementById('mAmt').value,
                cat:+document.getElementById('mCat').value, card:+document.getElementById('mCard').value, parcela:g.parcela };
    const invert=document.getElementById('mInv').value==='1';
    const src=document.getElementById('mSrc').value.trim()||'CSV';
    const tx=parseCSVrows(rows, map, src, invert, useCat);
    const r=await ingest(tx);
    finishImport(prevAdded+r.added, prevDup+r.dup);
  };
}

function finishImport(added,dup){
  closeSheet(); render();
  go('painel');
  toast(`${added} novos lançamentos${dup?` · ${dup} repetidos ignorados`:''}`);
}

function openTx(id){
  const t=TX.find(x=>x.id===id); if(!t) return;
  const {cat,sub}=catOf(t);
  const ignored=IGNORED.has(t.id);
  const dd=new Date(t.date+'T12:00');
  const picker=CATS.map(c=>{
    const on = cat.id===c.id;
    const subPills = c.subs.map(s=>`<button class="pill ${on&&sub&&sub.id===s.id?'on':''}" style="font-size:12px" onclick="setCat('${t.id}','${c.id}','${s.id}')">${s.nome}</button>`).join('');
    return `<div style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="catdot" style="background:${resolveColor(c.cor)}"></span><b style="font-size:13px">${c.nome}</b></div>
      <div class="catpick">${subPills}</div>
    </div>`;
  }).join('');
  openSheet(`
    <h3>${esc(t.desc)}</h3>
    <p class="hint">${dd.getDate()} ${MESLONG[dd.getMonth()].toLowerCase()} ${dd.getFullYear()} · ${esc(t.source)} · <b style="color:${t.amount>0?'var(--income)':'var(--expense)'}">${t.amount>0?'+':''}${BRL(t.amount)}</b></p>
    <button class="pill ${ignored?'on':''}" style="margin-bottom:14px" onclick="toggleIgnore('${t.id}')">${ignored?'✓ ':''}Desconsiderar no relatório</button>
    <label class="eyebrow" style="display:block;margin-bottom:10px">Categoria · subcategoria</label>
    ${picker}
    <button class="btn ghost block" style="margin-top:6px;color:var(--expense)" onclick="delTx('${t.id}')">Excluir lançamento</button>
  `);
}
async function setCat(txId, catId, subId){
  OVERRIDES[txId]=catId+'/'+subId; await DB.setKV('overrides',OVERRIDES);
  closeSheet(); render(); toast('Categoria atualizada');
}
async function toggleIgnore(txId){
  if(IGNORED.has(txId)) IGNORED.delete(txId); else IGNORED.add(txId);
  await DB.setKV('ignored',[...IGNORED]);
  render(); toast(IGNORED.has(txId)?'Marcado como desconsiderar':'Voltou pro relatório');
  const t=TX.find(x=>x.id===txId); if(t) openTx(txId); // reabre atualizado
}
async function delTx(id){
  await DB.del('tx',id); TX=TX.filter(t=>t.id!==id); delete OVERRIDES[id]; IGNORED.delete(id);
  await DB.setKV('overrides',OVERRIDES); await DB.setKV('ignored',[...IGNORED]);
  closeSheet(); render(); toast('Lançamento excluído');
}

const slug = s => norm(s).replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')||('s'+Date.now());
function editSub(catId, subId){
  const c=CATS.find(x=>x.id===catId); const s=c.subs.find(x=>x.id===subId); if(!s) return;
  openSheet(`
    <h3>Editar subcategoria</h3>
    <p class="hint">Em ${esc(c.nome)}</p>
    <div class="field"><label>Nome</label><input id="sN" value="${esc(s.nome)}"></div>
    <div class="field"><label>Palavras-chave (separadas por vírgula)</label><input id="sK" value="${esc((s.kws||[]).join(', '))}"></div>
    <button class="pill ${s.exclude?'on':''}" id="sX" style="margin-bottom:8px">${s.exclude?'✓ ':''}Fora do gasto (desconsiderar)</button>
    <p class="hint">Qualquer lançamento cuja descrição contenha uma dessas palavras cai aqui automaticamente.</p>
    <button class="btn primary block" onclick="saveSub('${catId}','${subId}')">Salvar</button>
    <button class="btn ghost block" style="margin-top:10px;color:var(--expense)" onclick="delSub('${catId}','${subId}')">Excluir subcategoria</button>
  `);
  let exc=!!s.exclude; document.getElementById('sX').onclick=function(){ exc=!exc; this.classList.toggle('on',exc); this._v=exc; };
  document.getElementById('sX')._v=exc;
}
async function saveSub(catId, subId){
  const c=CATS.find(x=>x.id===catId); const s=c.subs.find(x=>x.id===subId);
  s.nome=document.getElementById('sN').value.trim()||s.nome;
  s.kws=document.getElementById('sK').value.split(',').map(x=>x.trim()).filter(Boolean);
  s.exclude=!!document.getElementById('sX')._v;
  await DB.setKV('cats',CATS); closeSheet(); render(); toast('Subcategoria salva');
}
async function delSub(catId, subId){
  const c=CATS.find(x=>x.id===catId);
  if(!confirm('Excluir esta subcategoria? Os lançamentos dela voltam a ser classificados automaticamente.')) return;
  c.subs=c.subs.filter(x=>x.id!==subId);
  await DB.setKV('cats',CATS); closeSheet(); render(); toast('Subcategoria excluída');
}
function addSub(catId){
  const c=CATS.find(x=>x.id===catId);
  openSheet(`
    <h3>Nova subcategoria</h3>
    <p class="hint">Em ${esc(c.nome)}</p>
    <div class="field"><label>Nome</label><input id="nsN" placeholder="ex: Mercado"></div>
    <div class="field"><label>Palavras-chave (vírgula)</label><input id="nsK" placeholder="ex: carrefour, assai"></div>
    <button class="btn primary block" onclick="createSub('${catId}')">Criar</button>
  `);
  setTimeout(()=>document.getElementById('nsN')?.focus(),200);
}
async function createSub(catId){
  const c=CATS.find(x=>x.id===catId);
  const nome=document.getElementById('nsN').value.trim(); if(!nome){ toast('Dê um nome'); return; }
  let id=slug(nome); while(c.subs.some(s=>s.id===id)) id+='_';
  const kws=document.getElementById('nsK').value.split(',').map(x=>x.trim()).filter(Boolean);
  // insere antes de "sem_categoria"/"desconsiderar" se existirem
  const idx=c.subs.findIndex(s=>s.id==='sem_categoria'||s.id==='desconsiderar');
  c.subs.splice(idx<0?c.subs.length:idx,0,{id,nome,kws});
  await DB.setKV('cats',CATS); closeSheet(); render(); toast('Subcategoria criada');
}

/* =========================================================
   BACKUP / RESTORE / WIPE / DEMO
   ========================================================= */
async function doBackup(){
  const data={v:2, exported:new Date().toISOString(), tx:TX, overrides:OVERRIDES, ignored:[...IGNORED], cats:CATS};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`consolida-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url); toast('Backup exportado');
}
function doRestore(file){
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const data=JSON.parse(r.result);
      if(!data.tx) throw 0;
      await DB.clear('tx'); await DB.bulkPut('tx',data.tx);
      TX=data.tx; OVERRIDES=data.overrides||{}; IGNORED=new Set(data.ignored||[]); CATS=data.cats||CATS;
      await DB.setKV('overrides',OVERRIDES); await DB.setKV('ignored',[...IGNORED]); await DB.setKV('cats',CATS);
      render(); go('painel'); toast('Backup restaurado');
    }catch(e){ toast('Arquivo de backup inválido'); }
  };
  r.readAsText(file);
}
async function wipe(){
  if(!confirm('Apagar TODOS os lançamentos deste aparelho? Não dá pra desfazer (faça backup antes).')) return;
  await DB.clear('tx'); TX=[]; OVERRIDES={}; await DB.setKV('overrides',{});
  render(); go('painel'); toast('Tudo apagado');
}
async function loadDemo(){
  const cats=['mercado','aliment','transporte','assinat','compras','saude','lazer','moradia'];
  const descs={mercado:['Carrefour','Pão de Açúcar','Hortifruti','Assaí'],aliment:['iFood','Restaurante Sabor','Padaria','Starbucks'],transporte:['Uber','Posto Shell','99 App','Estacionamento'],assinat:['Netflix','Spotify','OpenAI ChatGPT','iCloud'],compras:['Amazon','Mercado Livre','Renner','Shopee'],saude:['Drogasil','SmartFit','Clínica Vida'],lazer:['Cinemark','Hotel Praia','Booking'],moradia:['Enel Energia','Sabesp','Vivo Fibra','Aluguel']};
  const srcs=['Nubank','Itaú cartão','Inter conta'];
  const demo=[];
  for(let m=0;m<3;m++){
    for(let i=0;i<22;i++){
      const cat=cats[Math.floor(Math.random()*cats.length)];
      const dl=descs[cat]; const desc=dl[Math.floor(Math.random()*dl.length)];
      const day=1+Math.floor(Math.random()*27);
      const dt=periodMonth(-m); const date=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const amount=-(Math.random()*240+12);
      demo.push({source:srcs[Math.floor(Math.random()*srcs.length)],date,amount:+amount.toFixed(2),desc});
    }
    const dt=periodMonth(-m);
    demo.push({source:'Nubank',date:`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-05`,amount:6500,desc:'Pagamento recebido salário'});
  }
  await ingest(demo); render(); go('painel'); toast('Dados de exemplo carregados');
}

/* =========================================================
   NAV / UTIL
   ========================================================= */
function go(tab){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  document.querySelectorAll('nav.tabbar button[data-tab]').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  window.scrollTo(0,0);
}
function changePeriod(dir){ periodOffset=Math.min(0, periodOffset+dir); render(); }
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600); }

document.getElementById('fileInput').addEventListener('change',e=>{ if(e.target.files.length) handleFiles(e.target.files); e.target.value=''; });
document.getElementById('restoreInput').addEventListener('change',e=>{ if(e.target.files[0]) doRestore(e.target.files[0]); e.target.value=''; });
document.getElementById('btnBackup').addEventListener('click',doBackup);

/* =========================================================
   BOOT
   ========================================================= */
(async function init(){
  try{
    CATS = await DB.getKV('cats', null);
    // estrutura antiga (plana, com .kws e sem .subs) -> substitui pela nova de 2 níveis
    if(!CATS || !CATS.length || !CATS[0].subs){
      CATS = JSON.parse(JSON.stringify(DEFAULT_CATS));
      await DB.setKV('cats',CATS);
      await DB.setKV('overrides',{});   // ids antigos não valem mais
    }
    OVERRIDES = await DB.getKV('overrides', {}) || {};
    IGNORED = new Set(await DB.getKV('ignored', []) || []);
    TX = await DB.all('tx');
  }catch(e){
    CATS = JSON.parse(JSON.stringify(DEFAULT_CATS)); OVERRIDES={}; IGNORED=new Set(); TX=[];
  }
  render();
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
})();
</script>
